services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://dinithiwijesinghe:password@db:5432/furniture_db
      - JWT_SECRET=your-secret-key-change-in-production
      - NEXT_PUBLIC_API_URL=http://localhost:5001
    networks:
      - app-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://dinithiwijesinghe:password@db:5432/furniture_db
      - PORT=5000
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=dinithiwijesinghe
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=furniture_db
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./server/database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./server/database/furniture-data.sql:/docker-entrypoint-initdb.d/2-data.sql
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@furniture.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
